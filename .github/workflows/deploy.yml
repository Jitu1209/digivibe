name: Deploy Website to GoDaddy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to GoDaddy VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }} # Falls back to password if you don't use SSH key
          port: 22
          script: |
            cd /var/www/beyondskills.in
            git reset --hard
            git pull origin main
